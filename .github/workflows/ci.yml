name: fintech CI pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Test the pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print a message
        run: echo "Pipeline is running!"

      - name: List project files
        run: ls

      - name: Setup python
        uses: actions/setup-python@v5
        with: 
          python-version: "3.11"

      - name: Install Install dependencies (ingestion)
        run: pip install -r ingestion/requirements.txt

      - name: Install dependencies (processing)
        run: pip install -r processing/requirements.txt

      - name: Install dependencies (validation)
        run: pip install -r validation/requirements.txt

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ingestion image
        run: docker build -t fintech-ingestion ./ingestion

      - name: Build processing image
        run: docker build -t fintech-processing ./processing

      - name: Build validation image
        run: docker build -t fintech-validation ./validation

      - name: Start pipeline
        run: docker compose up -d

      - name: Check running containers
        run: docker ps -a

      - name: Wait for ingestion up
        shell: bash
        run: |
          for i in {1..15}; do
            if curl -sf http://localhost:8000/health; then
              echo "Ingestion is up"
              break
            fi
            sleep 3
          done

      - name: Send a transaction
        run: |
          curl -sf -X POST http://localhost:8000/transaction \
          -H "Content-Type: application/json" \
          -d '{"amount": 1000, "currency": "NGN", "sender": "ci_test", "receiver": "merchant_01"}'

      - name: Check metrics endpoint
        run: curl -sf http://localhost:9100/metrics | grep transaction_received

  teardown:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Tear down
        if: always()
        run: docker compose down -v